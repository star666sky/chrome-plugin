<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>代码评审设置</title>
    <link rel="stylesheet" href="src/options.css">
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <div>
          <p class="settings-kicker">Bitbucket PR AI Reviewer</p>
          <h1>代码评审设置</h1>
          <p>配置 Bitbucket、DeepSeek 与评审规则。</p>
        </div>
        <div class="settings-badge" aria-hidden="true">
          <span>&lt;/&gt;</span>
        </div>
      </header>

      <div class="settings-layout">
        <aside class="settings-summary" aria-label="设置概览">
          <div class="summary-mark" aria-hidden="true">&lt;/&gt;</div>
          <h2>本地评审控制台</h2>
          <p>令牌与模型配置保存在当前 Chrome 扩展的本地存储中。</p>
          <div class="summary-list">
            <span>Bitbucket 连接</span>
            <span>DeepSeek 模型</span>
            <span>评审规则</span>
          </div>
        </aside>

        <form id="settings-form" class="settings-form">
          <section class="settings-section">
            <div class="section-header">
              <span>01</span>
              <div>
                <h2>Bitbucket 连接</h2>
                <p>用于读取合并请求信息和 diff 内容。</p>
              </div>
            </div>
            <label>
              服务地址
              <input name="bitbucketBaseUrl" type="url" autocomplete="off" placeholder="https://code.fineres.com">
            </label>
            <label>
              访问令牌
              <input name="bitbucketToken" type="password" autocomplete="off" placeholder="请输入 Bitbucket Token">
            </label>
            <label>
              认证方式
              <select name="bitbucketAuthScheme">
                <option value="Bearer">Bearer</option>
                <option value="Basic">Basic</option>
              </select>
            </label>
          </section>

          <section class="settings-section">
            <div class="section-header">
              <span>02</span>
              <div>
                <h2>DeepSeek 模型</h2>
                <p>用于生成代码评审结论。</p>
              </div>
            </div>
            <label>
              服务地址
              <input name="deepseekBaseUrl" type="url" autocomplete="off" placeholder="https://api.deepseek.com">
            </label>
            <label>
              API 密钥
              <input name="deepseekApiKey" type="password" autocomplete="off" placeholder="请输入 DeepSeek API Key">
            </label>
            <label>
              模型名称
              <input name="deepseekModel" type="text" autocomplete="off" placeholder="deepseek-v4-flash">
            </label>
          </section>

          <section class="settings-section">
            <div class="section-header">
              <span>03</span>
              <div>
                <h2>评审策略</h2>
                <p>控制 diff 切片、上下文范围和补充规则。</p>
              </div>
            </div>
            <div class="settings-grid">
              <label>
                单个片段最大字符数
                <input name="maxDiffCharsPerChunk" type="number" min="4000" max="50000" step="1000">
              </label>
              <label>
                diff 上下文行数
                <input name="contextLines" type="number" min="0" max="20" step="1">
              </label>
            </div>
            <label>
              评审规则
              <textarea name="reviewRules" rows="9" placeholder="填写额外评审关注点，例如：重点检查边界条件、权限变更、接口兼容性。"></textarea>
            </label>
          </section>

          <div class="settings-actions">
            <button class="primary" type="submit">保存设置</button>
            <button class="secondary" type="button" id="reset-button">恢复默认</button>
            <p id="status" class="status" role="status"></p>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="src/options.js"></script>
  </body>
</html>
