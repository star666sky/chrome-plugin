<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Style Inspector</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Visual QA</p>
          <h1>Style Inspector</h1>
        </div>
        <span class="status-dot" aria-hidden="true"></span>
      </header>

      <section class="panel">
        <h2>Display</h2>
        <div class="option-grid">
          <label class="switch-row">
            <input id="showPadding" type="checkbox" />
            <span>Padding</span>
          </label>
          <label class="switch-row">
            <input id="showMargin" type="checkbox" />
            <span>Margin</span>
          </label>
          <label class="switch-row">
            <input id="showBorder" type="checkbox" />
            <span>Border</span>
          </label>
          <label class="switch-row">
            <input id="showGap" type="checkbox" />
            <span>Gap</span>
          </label>
          <label class="switch-row">
            <input id="showSize" type="checkbox" />
            <span>Size</span>
          </label>
          <label class="switch-row is-color">
            <input id="showColor" type="checkbox" />
            <span>Color</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Mode</h2>
        <div class="segmented">
          <label>
            <input id="modeGlobal" name="mode" type="radio" value="global" />
            <span>Global</span>
          </label>
          <label>
            <input id="modeHover" name="mode" type="radio" value="hover" />
            <span>Hover</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Selection</h2>
        <div class="segmented">
          <label>
            <input id="selectionDescendants" name="selectionScope" type="radio" value="descendants" />
            <span>Inside</span>
          </label>
          <label>
            <input id="selectionSelf" name="selectionScope" type="radio" value="self" />
            <span>Self</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Visual</h2>
        <label class="range-row">
          <span>Opacity</span>
          <input id="opacity" type="range" min="0.04" max="0.35" step="0.01" />
          <strong id="opacityValue"></strong>
        </label>
        <label class="range-row">
          <span>Text</span>
          <input id="labelSize" type="range" min="9" max="16" step="1" />
          <strong id="labelSizeValue"></strong>
        </label>
        <label class="range-row">
          <span>Count</span>
          <input id="maxAnnotations" type="range" min="20" max="1000" step="20" />
          <strong id="maxAnnotationsValue"></strong>
        </label>
        <label class="color-row">
          <span>Accent</span>
          <input id="highlightColor" type="color" />
        </label>
      </section>

      <section class="panel">
        <h2>Layer Colors</h2>
        <div class="color-grid">
          <label>
            <span>Padding</span>
            <input id="paddingColor" type="color" />
          </label>
          <label>
            <span>Margin</span>
            <input id="marginColor" type="color" />
          </label>
          <label>
            <span>Border</span>
            <input id="borderColor" type="color" />
          </label>
          <label>
            <span>Gap</span>
            <input id="gapColor" type="color" />
          </label>
        </div>
      </section>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
